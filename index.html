<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Adaptive Daily Routine</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14181B">

<!-- iOS home-screen install support: Safari ignores manifest.json for these bits -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Routine">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<style>
  :root {
    --bg: #14181B;
    --bg-card: #1D2226;
    --text: #EDE7DA;
    --text-dim: #8B9198;
    --line: #2A3036;
    --full: #C9A15B;
    --recovery: #7FA391;
    --anchor: #B85C4A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: max(18px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) calc(76px + env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  header { text-align: center; padding: 6px 0 18px; }
  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 28px; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .subtitle { color: var(--text-dim); font-size: 12.5px; margin-top: 4px; }

  /* template picker */
  .template-picker { margin-bottom: 16px; }
  .template-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 8px; }
  .template-options { display: flex; gap: 8px; }
  .template-btn {
    flex: 1; padding: 10px 8px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--bg-card); color: var(--text-dim); font-size: 12.5px; text-align: center;
    cursor: pointer; transition: all .2s ease; line-height: 1.3;
  }
  .template-btn.active { border-color: var(--full); color: var(--text); background: #23201A; }

  .toggle {
    display: flex; background: var(--bg-card); border-radius: 999px; padding: 4px;
    margin: 16px 0 14px; border: 1px solid var(--line);
  }
  .toggle button {
    flex: 1; border: none; background: transparent; color: var(--text-dim);
    font-family: 'Barlow Condensed', sans-serif; font-size: 16px; letter-spacing: 0.5px;
    text-transform: uppercase; padding: 9px 0; border-radius: 999px; cursor: pointer; transition: all .25s ease;
  }
  .toggle button.active#btn-full { background: var(--full); color: #1A1408; font-weight: 700; }
  .toggle button.active#btn-recovery { background: var(--recovery); color: #0E1B15; font-weight: 700; }

  .mode-note { font-size: 12.5px; color: var(--text-dim); text-align: center; margin-bottom: 18px; padding: 0 8px; line-height: 1.5; }

  .row {
    display: flex; align-items: flex-start; gap: 14px; padding: 12px 4px;
    border-bottom: 1px solid var(--line); transition: background .15s ease;
  }
  .row:last-child { border-bottom: none; }
  .row.anchor .time { color: var(--anchor); font-weight: 700; }
  .row.anchor .activity-title { font-weight: 600; }
  .row[data-index] { cursor: pointer; }
  .row[data-index]:active { background: rgba(255,255,255,0.03); }
  .time { flex-shrink: 0; width: 72px; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; color: var(--text-dim); padding-top: 1px; }
  .mode-full .time { color: var(--full); }
  .mode-recovery .time { color: var(--recovery); }
  .mode-full .row.anchor .time, .mode-recovery .row.anchor .time { color: var(--anchor); }
  .activity { font-size: 14px; line-height: 1.4; flex: 1; }
  .activity-title { display: flex; align-items: center; gap: 6px; }
  .tap-hint { font-size: 11px; color: var(--text-dim); opacity: 0.6; }
  .check-badge { font-size: 11px; color: var(--text-dim); }
  .activity .note { display: block; color: var(--text-dim); font-size: 12px; margin-top: 2px; }

  .log-box {
    margin-top: 22px; padding: 14px 16px; background: var(--bg-card); border-radius: 10px;
    border: 1px solid var(--line);
  }
  .log-box strong { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); display: block; margin-bottom: 10px; }
  .log-days { display: flex; gap: 6px; }
  .log-day {
    flex: 1; text-align: center; padding: 8px 2px; border-radius: 7px; font-size: 11px;
    background: #14181B; color: var(--text-dim); border: 1px solid var(--line);
  }
  .log-day.full { border-color: var(--full); color: var(--full); }
  .log-day.recovery { border-color: var(--recovery); color: var(--recovery); }
  .log-day .d { font-size: 9px; opacity: 0.7; display: block; margin-bottom: 2px; }

  .export-btn {
    display: block; width: 100%; margin-top: 14px; background: none; border: 1px solid var(--line);
    color: var(--text-dim); padding: 10px; border-radius: 8px; font-size: 13px; cursor: pointer; text-align: center;
  }

  .foot { text-align: center; font-size: 11px; color: var(--text-dim); margin-top: 24px; opacity: 0.6; line-height: 1.6; }

  /* views + bottom nav */
  .view { display: none; }
  .view.active { display: block; }

  .bottom-nav {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 5; max-width: 480px; margin: 0 auto;
    display: flex; background: var(--bg-card); border-top: 1px solid var(--line);
    padding: 8px 14px calc(8px + env(safe-area-inset-bottom));
  }
  .nav-btn {
    flex: 1; border: none; background: transparent; color: var(--text-dim);
    font-family: 'Barlow Condensed', sans-serif; font-size: 14px; letter-spacing: 0.5px;
    text-transform: uppercase; padding: 8px 0; cursor: pointer;
  }
  .nav-btn.active { color: var(--text); font-weight: 700; }

  /* detail sheet */
  .sheet-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55); opacity: 0; pointer-events: none;
    transition: opacity .2s ease; z-index: 10;
  }
  .sheet-backdrop.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; max-width: 480px; margin: 0 auto;
    background: var(--bg-card); border-radius: 18px 18px 0 0; border: 1px solid var(--line);
    padding: 20px 20px calc(28px + env(safe-area-inset-bottom)); transform: translateY(100%); transition: transform .25s ease; z-index: 11;
    max-height: 78vh; overflow-y: auto;
  }
  .sheet.open { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 4px; background: var(--line); border-radius: 999px; margin: 0 auto 16px; }
  .sheet-title { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .sheet-time { font-size: 12px; color: var(--text-dim); margin-bottom: 16px; }
  .sheet-body { font-size: 14px; line-height: 1.7; color: var(--text); }
  .sheet-body p { margin-bottom: 10px; }

  .checklist-section {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim);
    margin: 16px 0 6px;
  }
  .checklist-group:first-child .checklist-section { margin-top: 0; }

  .checklist-item {
    display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line);
  }
  .checklist-item:last-child { border-bottom: none; }
  .checklist-item input { width: 18px; height: 18px; margin-top: 2px; flex-shrink: 0; accent-color: var(--full); }
  .checklist-item-text { flex: 1; min-width: 0; }
  .checklist-item-head { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .checklist-name { font-size: 14px; }
  .checklist-dose { font-size: 12px; color: var(--text-dim); flex-shrink: 0; white-space: nowrap; }
  .checklist-cue { font-size: 12px; color: var(--text-dim); margin-top: 3px; line-height: 1.4; }
  .checklist-item.checked .checklist-name,
  .checklist-item.checked .checklist-dose,
  .checklist-item.checked .checklist-cue { color: var(--text-dim); text-decoration: line-through; }

  .checklist-remove {
    width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--anchor); background: none;
    color: var(--anchor); font-size: 14px; line-height: 1; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; padding: 0;
  }

  .add-item-btn {
    display: block; width: 100%; text-align: left; background: none; border: none;
    color: var(--text-dim); font-size: 13px; padding: 10px 0; cursor: pointer;
  }
  .add-item-row { display: flex; gap: 8px; padding: 8px 0; align-items: center; }
  .add-item-input {
    flex: 1; background: var(--bg); border: 1px solid var(--line); border-radius: 8px;
    padding: 8px 10px; color: var(--text); font-size: 14px; font-family: inherit;
  }
  .add-item-confirm {
    background: var(--full); color: #1A1408; border: none; border-radius: 8px;
    padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer;
  }

  .sheet-actions { display: flex; gap: 10px; margin-top: 18px; }
  .close-btn, .edit-btn {
    flex: 1; background: none; border: 1px solid var(--line);
    color: var(--text-dim); padding: 9px 22px; border-radius: 999px; font-size: 13px; cursor: pointer;
  }
  .edit-btn.active { border-color: var(--full); color: var(--text); }

  .toast {
    position: fixed; left: 14px; right: 14px; max-width: 452px; margin: 0 auto;
    bottom: calc(64px + env(safe-area-inset-bottom));
    background: var(--bg-card); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    opacity: 0; transform: translateY(8px); pointer-events: none; transition: opacity .2s ease, transform .2s ease;
    z-index: 20;
  }
  .toast.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .toast-message { font-size: 13px; color: var(--text); }
  .toast-undo { background: none; border: none; color: var(--full); font-weight: 700; font-size: 13px; cursor: pointer; padding: 4px 8px; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Daily Routine</h1>
    <div class="subtitle" id="subtitle">Adaptive schedule</div>
  </header>

  <section id="view-today" class="view active">
    <div class="template-picker">
      <div class="template-label">Template</div>
      <div class="template-options" id="template-picker"></div>
    </div>

    <div class="toggle" id="mode-toggle"></div>

    <div class="mode-note" id="mode-note"></div>

    <div id="schedule"></div>

    <div class="foot">Tap any task with a &rsaquo; to see its details.</div>
  </section>

  <section id="view-history" class="view">
    <div class="log-box">
      <strong>Mode log — last 7 days</strong>
      <div class="log-days" id="log-days"></div>
      <button class="export-btn" id="export-log">Export full history</button>
    </div>
  </section>
</div>

<nav class="bottom-nav" id="bottom-nav"></nav>

<div class="sheet-backdrop" id="backdrop"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheet-title"></div>
  <div class="sheet-time" id="sheet-time"></div>
  <div class="sheet-body" id="sheet-body"></div>
  <div class="sheet-actions">
    <button class="edit-btn" id="sheet-edit" style="display:none;">Edit</button>
    <button class="close-btn" id="sheet-close">Close</button>
  </div>
</div>

<div class="toast" id="toast">
  <span class="toast-message" id="toast-message"></span>
  <button class="toast-undo" id="toast-undo">Undo</button>
</div>

<script type="module" src="src/app.js"></script>
</body>
</html>
