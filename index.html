<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Adaptive Daily Routine</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14181B">

<!-- iOS home-screen install support: Safari ignores manifest.json for these bits -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Routine">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<style>
  :root {
    --bg: #14181B;
    --bg-card: #1D2226;
    --text: #EDE7DA;
    --text-dim: #8B9198;
    --line: #2A3036;
    --full: #C9A15B;
    --recovery: #7FA391;
    --anchor: #B85C4A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: max(18px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) calc(60px + env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  header { text-align: center; padding: 6px 0 18px; }
  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 28px; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .subtitle { color: var(--text-dim); font-size: 12.5px; margin-top: 4px; }

  .status-box {
    margin-top: 22px; padding: 14px 16px; background: var(--bg-card); border-radius: 10px;
    border: 1px solid var(--line);
  }
  .status-box strong {
    font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim);
    display: block; margin-bottom: 10px;
  }
  .status-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 13px; }
  .status-row:not(:last-child) { border-bottom: 1px solid var(--line); }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 8px; background: var(--text-dim); }
  .dot.ok { background: var(--recovery); }
  .dot.fail { background: var(--anchor); }
  .status-label { display: flex; align-items: center; }
  .status-value { color: var(--text-dim); }

  .foot { text-align: center; font-size: 11px; color: var(--text-dim); margin-top: 24px; opacity: 0.6; line-height: 1.6; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Daily Routine</h1>
    <div class="subtitle">Step 1 — PWA shell check</div>
  </header>

  <div class="status-box">
    <strong>Install &amp; offline status</strong>
    <div class="status-row">
      <span class="status-label"><span class="dot" id="dot-sw"></span>Service worker</span>
      <span class="status-value" id="val-sw">checking…</span>
    </div>
    <div class="status-row">
      <span class="status-label"><span class="dot" id="dot-installed"></span>Display mode</span>
      <span class="status-value" id="val-installed">checking…</span>
    </div>
    <div class="status-row">
      <span class="status-label"><span class="dot" id="dot-manifest"></span>Manifest</span>
      <span class="status-value" id="val-manifest">checking…</span>
    </div>
  </div>

  <div class="foot">
    This screen only confirms the PWA shell (install + offline caching) is working.<br>
    The actual schedule/template UI comes in the next step.
  </div>
</div>

<script src="src/app.js"></script>
</body>
</html>
